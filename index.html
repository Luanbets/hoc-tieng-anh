<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay SRS Tiếng Anh</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4cc9f0; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Giao diện Glassmorphism */
        .glass { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        
        /* Biểu đồ Dashboard */
        .stats-container { display: flex; align-items: flex-end; justify-content: space-around; height: 120px; padding-bottom: 10px; }
        .stat-bar { width: 40px; background: var(--primary); border-radius: 5px; position: relative; transition: height 0.5s; }
        .stat-label { position: absolute; bottom: -25px; left: 0; width: 100%; text-align: center; font-size: 10px; opacity: 0.7; }

        /* Chia Ngày (Folders) */
        .day-scroller { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; }
        .day-card { min-width: 80px; padding: 10px; text-align: center; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; }
        .day-card.active { background: var(--primary); color: #000; font-weight: bold; }

        input, select { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin: 5px 0; }
        .btn-add { background: linear-gradient(135deg, #4361ee, #4cc9f0); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .word-card { display: flex; align-items: center; justify-content: space-between; padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        .lvl-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: #f72585; }
    </style>
</head>
<body>

<div style="max-width: 600px; margin: auto;">
    <h2 style="text-align:center">Tổng quan SRS 📊</h2>
    
    <div class="glass">
        <div class="stats-container" id="chart">
            </div>
    </div>

    <div class="glass">
        <h3>Lộ trình 100 ngày</h3>
        <div class="day-scroller" id="dayList">
            </div>
    </div>

    <div class="glass">
        <h3>Thêm từ mới cho <span id="currentDayTxt">Ngày 1</span></h3>
        <input type="text" id="word" placeholder="Từ vựng...">
        <input type="text" id="mean" placeholder="Nghĩa...">
        <input type="text" id="img" placeholder="Link ảnh minh họa...">
        <button class="btn-add" onclick="saveWord()">LƯU VÀO HỆ THỐNG</button>
    </div>

    <div id="displayArea">
        </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBd6yYbRWUvmq-diATZGKLoJLFCo2G-ptA",
        authDomain: "myvocab-e4e18.firebaseapp.com",
        databaseURL: "https://myvocab-e4e18-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "myvocab-e4e18",
        storageBucket: "myvocab-e4e18.firebasestorage.app",
        messagingSenderId: "450140128601",
        appId: "1:450140128601:web:49e42b21e687d19bceb848"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentDay = 1;

    // Tạo danh sách 100 ngày
    const dayList = document.getElementById('dayList');
    for(let i=1; i<=100; i++) {
        const div = document.createElement('div');
        div.className = `day-card ${i===1?'active':''}`;
        div.innerText = `Ngày ${i}`;
        div.onclick = () => {
            document.querySelectorAll('.day-card').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            currentDay = i;
            document.getElementById('currentDayTxt').innerText = `Ngày ${i}`;
            loadWords();
        };
        dayList.appendChild(div);
    }

    function saveWord() {
        const w = document.getElementById('word').value;
        const m = document.getElementById('mean').value;
        const i = document.getElementById('img').value;
        if(w && m) {
            db.ref(`srs_data/day_${currentDay}`).push({
                word: w, mean: m, image: i,
                level: 1, 
                nextReview: Date.now() + 86400000 // +1 ngày
            });
            document.getElementById('word').value = '';
            document.getElementById('mean').value = '';
            document.getElementById('img').value = '';
        }
    }

    function loadWords() {
        db.ref(`srs_data/day_${currentDay}`).on('value', (snap) => {
            const area = document.getElementById('displayArea');
            area.innerHTML = '';
            snap.forEach(child => {
                const d = child.val();
                area.innerHTML += `
                    <div class="word-card glass">
                        <div>
                            <strong>${d.word}</strong> <span class="lvl-badge">Lvl ${d.level}</span><br>
                            <small>${d.mean}</small>
                        </div>
                        ${d.image ? `<img src="${d.image}" style="width:50px;height:50px;border-radius:10px;object-fit:cover">` : ''}
                    </div>
                `;
            });
            updateChart();
        });
    }

    function updateChart() {
        const chart = document.getElementById('chart');
        chart.innerHTML = '';
        const mockLevels = [5, 12, 8, 3, 2]; // Sau này sẽ code hàm đếm thật từ Firebase
        mockLevels.forEach((val, i) => {
            chart.innerHTML += `<div class="stat-bar" style="height:${val*5}px"><div class="stat-label">Lvl ${i+1}</div></div>`;
        });
    }

    loadWords();
    updateChart();
</script>
</body>
</html>
